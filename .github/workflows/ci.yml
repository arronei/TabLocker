name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test:unit:coverage
      - run: yarn build

      - uses: codecov/codecov-action@v5
        with:
          # Public repo: works tokenless once "Global Upload Token" is enabled
          # for the org at codecov.io; CODECOV_TOKEN secret is optional but
          # more reliable if the repo owner sets one up.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true

      - run: yarn playwright install --with-deps chromium
      # Calls the playwright binary directly, bypassing the "pretest:e2e"
      # script hook - dist/chrome was already built by the "yarn build" step
      # above, so rebuilding here would just be duplicate work.
      - run: yarn playwright test
