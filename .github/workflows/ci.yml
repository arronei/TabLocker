name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test:unit:coverage
      - run: yarn build

      - uses: codecov/codecov-action@v5
        with:
          # Public repo: works tokenless once "Global Upload Token" is enabled
          # for the org at codecov.io; CODECOV_TOKEN secret is optional but
          # more reliable if the repo owner sets one up.
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true

      - run: yarn playwright install --with-deps chromium
      # Calls the playwright binary directly, bypassing the "pretest:e2e"
      # script hook - dist/chrome was already built by the "yarn build" step
      # above, so rebuilding here would just be duplicate work.
      - run: yarn playwright test

      - uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          name: coverage-html
          path: coverage/lcov-report
          retention-days: 1

  deploy-pages:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: coverage-html
          path: dashboards/coverage

      - run: cp pages/index.html dashboards/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dashboards

      - uses: actions/deploy-pages@v5
        id: deployment
